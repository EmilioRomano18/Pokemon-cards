<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokéCard Shop Retro - Pure Tailwind</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-[#e0f8cf] font-['Press_Start_2P'] text-gray-900 min-h-screen">
    <nav
      class="w-full py-4 bg-blue-700 border-b-4 border-black sticky top-0 z-50"
    >
      <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
        <h1
          class="text-xl md:text-2xl text-[#ffde00] drop-shadow-[3px_3px_0_#000]"
        >
          Poké<span class="text-white">Shop</span>
        </h1>
        <div class="flex space-x-4">
          <span
            class="px-2 py-2 bg-[#ffde00] border-2 border-black text-black text-[10px] shadow-[2px_2px_0_#000] leading-tight"
          >
            STOCK LIMITADO
          </span>
        </div>
      </div>
    </nav>

    <header class="text-center mt-12 mb-10 px-4">
      <span
        class="bg-white border-2 border-black px-4 py-3 text-xs text-black shadow-[4px_4px_0_#000] mb-6 inline-block"
      >
        ¡EVENTO EXCLUSIVO!
      </span>
      <h2
        class="text-2xl md:text-4xl leading-snug mb-6 drop-shadow-[3px_3px_0_#fff]"
      >
        ELIGE TU BANDO
      </h2>
      <div
        class="bg-white border-4 border-black p-6 max-w-2xl mx-auto shadow-[6px_6px_0_#000]"
      >
        <p
          class="text-xs md:text-sm font-sans font-bold leading-relaxed tracking-wide"
        >
          ¿El poder destructivo del FUEGO o la defensa del AGUA?
          <br /><br />Selecciona tu edición favorita para comenzar la batalla.
        </p>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 mb-40">
      <div
        class="grid grid-cols-1 md:grid-cols-2 gap-10 md:gap-16 items-center"
      >
        <div
          id="card-1"
          onclick="toggleProduct(1)"
          class="group cursor-pointer relative border-4 border-black bg-[#f8f8f8] shadow-[8px_8px_0_#000] overflow-hidden opacity-80 grayscale hover:grayscale-0 hover:opacity-100 hover:-translate-y-1 hover:shadow-[12px_12px_0_#000] transition-none"
        >
          <div id="check-1" class="absolute top-4 right-4 hidden z-20">
            <div
              class="bg-[#ffde00] border-2 border-black p-2 shadow-[2px_2px_0_#000]"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-6 w-6 text-black"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="4"
              >
                <path
                  stroke-linecap="square"
                  stroke-linejoin="miter"
                  d="M5 13l4 4L19 7"
                />
              </svg>
            </div>
          </div>

          <div
            class="w-full h-[400px] relative bg-black border-b-4 border-black flex items-center justify-center overflow-hidden"
          >
            <div class="absolute inset-0 bg-red-900/50"></div>

            <img
              src="Imagenes/charizard.png"
              onerror="
                this.src =
                  'https://images.unsplash.com/photo-1613771404784-3a5686aa2be3?q=80&w=600&auto=format&fit=crop'
              "
              alt="Edición Fuego"
              class="object-contain w-full h-full p-8 z-10 transition-transform group-hover:scale-110 duration-75"
            />
          </div>

          <div class="text-center p-6 bg-[#f8f8f8] relative z-10">
            <h3 class="text-lg text-red-600 drop-shadow-[1px_1px_0_#000] mb-4">
              Charizard VMAX
            </h3>

            <div
              class="bg-white border-2 border-black p-2 mb-4 font-sans font-bold text-xs"
            >
              <p>ATK: Alto | DEF: Medio</p>
            </div>

            <p class="text-xl mb-4">$250</p>

            <button
              class="w-full py-4 border-2 border-black bg-gray-200 text-gray-600 text-xs shadow-[2px_2px_0_#000] group-hover:bg-gray-300 active:translate-y-1 active:shadow-none"
              id="btn-text-1"
            >
              SELECCIONAR
            </button>
          </div>
        </div>

        <div
          id="card-2"
          onclick="toggleProduct(2)"
          class="group cursor-pointer relative border-4 border-black bg-[#f8f8f8] shadow-[8px_8px_0_#000] overflow-hidden opacity-80 grayscale hover:grayscale-0 hover:opacity-100 hover:-translate-y-1 hover:shadow-[12px_12px_0_#000] transition-none"
        >
          <div id="check-2" class="absolute top-4 right-4 hidden z-20">
            <div
              class="bg-[#ffde00] border-2 border-black p-2 shadow-[2px_2px_0_#000]"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-6 w-6 text-black"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="4"
              >
                <path
                  stroke-linecap="square"
                  stroke-linejoin="miter"
                  d="M5 13l4 4L19 7"
                />
              </svg>
            </div>
          </div>

          <div
            class="w-full h-[400px] relative bg-black border-b-4 border-black flex items-center justify-center overflow-hidden"
          >
            <div class="absolute inset-0 bg-blue-900/50"></div>

            <img
              src="Imagenes/blais.png"
              onerror="
                this.src =
                  'https://images.unsplash.com/photo-1613771404721-c5b08c6ceb61?q=80&w=600&auto=format&fit=crop'
              "
              alt="Edición Agua"
              class="object-contain w-full h-full p-8 z-10 transition-transform group-hover:scale-110 duration-75"
            />
          </div>

          <div class="text-center p-6 bg-[#f8f8f8] relative z-10">
            <h3 class="text-lg text-blue-600 drop-shadow-[1px_1px_0_#000] mb-4">
              Blastoise VMAX
            </h3>

            <div
              class="bg-white border-2 border-black p-2 mb-4 font-sans font-bold text-xs"
            >
              <p>ATK: Medio | DEF: Alto</p>
            </div>

            <p class="text-xl mb-4">$240</p>

            <button
              class="w-full py-4 border-2 border-black bg-gray-200 text-gray-600 text-xs shadow-[2px_2px_0_#000] group-hover:bg-gray-300 active:translate-y-1 active:shadow-none"
              id="btn-text-2"
            >
              SELECCIONAR
            </button>
          </div>
        </div>
      </div>

      <div
        class="fixed bottom-0 left-0 w-full bg-blue-700 border-t-4 border-black p-4 z-50"
      >
        <div
          class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4"
        >
          <div class="text-center md:text-left text-white">
            <p class="text-[10px] mb-2">TU EQUIPO:</p>
            <div
              id="summary-text"
              class="text-sm text-[#ffde00] drop-shadow-[2px_2px_0_#000]"
            >
              VACÍO
            </div>
          </div>

          <button
            class="bg-[#ffde00] border-2 border-black text-black text-xs py-4 px-8 shadow-[4px_4px_0_#000] hover:translate-y-1 hover:shadow-none active:bg-yellow-500"
          >
            PAGAR (START)
          </button>
        </div>
      </div>
    </main>

    <script>
      // Definimos los colores y clases exactas aquí para inyectarlos con JS
      const inventory = {
        1: {
          name: "Charizard",
          price: 250.0,
          bgClass: "bg-red-600",
          shadowColor: "#cc0000", // Color hexadecimal para la sombra dinámica
        },
        2: {
          name: "Blastoise",
          price: 240.0,
          bgClass: "bg-blue-600",
          shadowColor: "#0000cc",
        },
      };

      const selection = { 1: false, 2: false };

      function toggleProduct(id) {
        selection[id] = !selection[id];

        const card = document.getElementById(`card-${id}`);
        const check = document.getElementById(`check-${id}`);
        const btnText = document.getElementById(`btn-text-${id}`);
        const product = inventory[id];

        if (selection[id]) {
          // ACTIVAR (Estilo Retro)
          // 1. Quitar filtros
          card.classList.remove("opacity-80", "grayscale");

          // 2. Aplicar borde coloreado y sombra coloreada manualmente
          // Nota: Como no podemos usar clases dinámicas arbitrarias fácilmente en string literals complejos sin setup,
          // usaremos style.boxShadow para la sombra de color específico, que es CSS inline (permitido vs CSS stylesheet).
          card.style.boxShadow = `12px 12px 0px ${product.shadowColor}`;
          card.classList.add("opacity-100", "grayscale-0", "-translate-y-2");

          // 3. Mostrar Check
          check.classList.remove("hidden");

          // 4. Botón
          btnText.textContent = "LISTO!";
          btnText.classList.remove("bg-gray-200", "text-gray-600");
          btnText.classList.add(product.bgClass, "text-white", "border-white");
        } else {
          // DESACTIVAR
          card.classList.add("opacity-80", "grayscale");
          card.classList.remove("opacity-100", "grayscale-0", "-translate-y-2");
          // Resetear sombra a la clase original de Tailwind (negra)
          card.style.boxShadow = "";

          check.classList.add("hidden");

          btnText.textContent = "SELECCIONAR";
          btnText.classList.add("bg-gray-200", "text-gray-600");
          btnText.classList.remove(
            product.bgClass,
            "text-white",
            "border-white",
          );
        }

        updateSummary();
      }

      function updateSummary() {
        const summaryEl = document.getElementById("summary-text");
        let total = 0;
        let items = [];

        for (const [id, isSelected] of Object.entries(selection)) {
          if (isSelected) {
            const prod = inventory[id];
            total += prod.price;
            items.push(prod.name);
          }
        }

        if (items.length === 0) {
          summaryEl.textContent = "VACÍO";
        } else {
          summaryEl.innerHTML = `${items.join(" + ")} | TOTAL: $${total}`;
        }
      }
    </script>
  </body>
</html>
